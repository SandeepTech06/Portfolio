    <text x="66" y="137" fill="#8AC5FF" font-family="'Consolas', monospace" font-size="30">S3cur3P@ssword2026!</text>

    <text x="42" y="214" fill="#D5E9FF" font-family="'Segoe UI', Arial, sans-serif" font-size="22">Strength Meter</text>
    <rect x="42" y="236" width="120" height="24" rx="12" fill="#FF4D6D"/>
    <rect x="172" y="236" width="120" height="24" rx="12" fill="#FF9B42"/>
    <rect x="302" y="236" width="120" height="24" rx="12" fill="#FFE25C"/>
    <rect x="432" y="236" width="120" height="24" rx="12" fill="#45E58A"/>
    <rect x="562" y="236" width="96" height="24" rx="12" fill="#2FC8FF"/>

